<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section | Editorial Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

    <style>
        .font-sans-custom { font-family: 'Jost', sans-serif; }
        .font-serif-custom { font-family: 'Playfair Display', serif; }

        /* The Editorial Beige Upgrade */
        .bg-elegant-beige {
            background: radial-gradient(circle at top center, #F7F3EE 0%, #E6DCD0 60%, #D4C4B4 100%);
        }

        /* Deep Navy for rich contrast */
        .text-navy {
            color: #1A2B4C;
        }
        .bg-navy {
            background-color: #1A2B4C;
        }

        /* Subtle drop shadow instead of a glowing effect for a daytime/beige vibe */
        .text-editorial-shadow {
            text-shadow: 0 15px 35px rgba(26, 43, 76, 0.15);
        }

        .mask-bottom {
            -webkit-mask-image: linear-gradient(to top, transparent 5%, black 25%);
            mask-image: linear-gradient(to top, transparent 5%, black 25%);
        }
    </style>
</head>
<body class="bg-elegant-beige text-navy font-sans-custom overflow-hidden h-screen relative selection:bg-navy selection:text-[#F7F3EE]">

<header class="absolute top-0 left-0 w-full flex justify-between items-center px-8 py-10 md:px-16 z-30 uppercase tracking-[0.3em] text-[10px] md:text-xs font-light">
    <a href="#" class="hover:tracking-[0.4em] transition-all duration-500">YSB</a>

    <button class="flex flex-col items-center group space-y-2">
        <div class="relative w-10 h-[1px] bg-navy overflow-hidden">
            <div class="absolute inset-0 bg-navy translate-x-0 group-hover:translate-x-full transition-transform duration-500"></div>
            <div class="absolute inset-0 bg-navy -translate-x-full group-hover:translate-x-0 transition-transform duration-500"></div>
        </div>
        <span class="opacity-80 group-hover:opacity-100 transition-opacity">Menu</span>
    </button>

    <a href="#" class="hover:opacity-60 transition-opacity">Contact</a>
</header>

<div class="absolute inset-0 flex items-center justify-center z-10 pointer-events-none">
    <h1 class="text-[32vw] md:text-[28vw] font-serif-custom text-navy leading-none select-none tracking-tighter opacity-85 text-editorial-shadow">
        Yuliy
    </h1>
</div>

<div class="absolute bottom-0 left-1/2 transform -translate-x-1/2 w-full h-[75vh] md:h-[90vh] z-20 flex justify-center items-end pointer-events-none">
    <img src="111.png"
         alt="Model Profile"
         class="h-full w-auto object-cover object-top mask-bottom drop-shadow-2xl" />
</div>

<div class="absolute inset-0 z-40 pointer-events-none opacity-[0.04] mix-blend-multiply bg-[url('https://grainy-gradients.vercel.app/noise.svg')]"></div>

</body>
</html>
