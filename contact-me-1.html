<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Editorial Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#1A2B4C',
                    }
                }
            }
        }
    </script>

    <style>
        .font-sans-custom { font-family: 'Jost', sans-serif; }
        .font-serif-custom { font-family: 'Playfair Display', serif; }

        .bg-elegant-beige {
            background: radial-gradient(circle at top right, #F7F3EE 0%, #E6DCD0 60%, #D4C4B4 100%);
        }

        /* Floating label transition logic */
        .input-peer:focus + .label-peer,
        .input-peer:not(:placeholder-shown) + .label-peer {
            transform: translateY(-1.5rem);
            font-size: 0.65rem;
            opacity: 1;
            letter-spacing: 0.2em;
        }
    </style>
</head>
<body class="bg-elegant-beige text-navy font-sans-custom overflow-x-hidden min-h-screen relative selection:bg-navy selection:text-[#F7F3EE]">

    <header class="absolute top-0 left-0 w-full flex justify-between items-center px-8 py-10 md:px-16 z-30 uppercase tracking-[0.3em] text-[10px] md:text-xs font-light">

        <a href="index.html" class="text-2xl hover:tracking-[0.4em] transition-all duration-500">YSB</a>

        <button class="flex flex-col items-center group space-y-2">
            <div class="relative w-10 h-[1px] bg-navy overflow-hidden">
                <div class="absolute inset-0 bg-navy translate-x-0 group-hover:translate-x-full transition-transform duration-500"></div>
                <div class="absolute inset-0 bg-navy -translate-x-full group-hover:translate-x-0 transition-transform duration-500"></div>
            </div>
            <span class="opacity-80 group-hover:opacity-100 transition-opacity">Menu</span>
        </button>

        <a href="index.html" class="hover:opacity-60 transition-opacity">Home</a>
    </header>

    <main class="relative z-20 flex min-h-screen items-center justify-center px-8 md:px-16 pt-32 pb-20">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 lg:gap-24 w-full max-w-6xl">
            
            <div class="flex flex-col justify-center">
                <h1 class="font-serif-custom text-6xl md:text-8xl text-navy leading-none select-none tracking-tighter mb-8">
                    Let's talk.
                </h1>
                <p class="text-lg md:text-xl opacity-80 mb-12 font-light max-w-md">
                    Open for freelance opportunities, creative collaborations, and editorial inquiries.
                </p>

                <div class="space-y-8 uppercase tracking-[0.2em] text-[10px] md:text-xs">
                    <div>
                        <span class="block opacity-40 mb-2 font-semibold">Email</span>
                        <a href="mailto:hello@yuliybodurski.com" class="hover:opacity-60 transition-opacity text-sm">hello@yuliybodurski.com</a>
                    </div>
                    <div>
                        <span class="block opacity-40 mb-2 font-semibold">Socials</span>
                        <div class="flex space-x-6">
                            <a href="#" class="hover:opacity-60 transition-opacity">Instagram</a>
                            <a href="#" class="hover:opacity-60 transition-opacity">LinkedIn</a>
                            <a href="#" class="hover:opacity-60 transition-opacity">Behance</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex items-center">
                <form class="w-full space-y-12">
                    
                    <div class="relative">
                        <input type="text" id="name" placeholder=" " class="input-peer w-full bg-transparent border-b border-navy/30 py-3 focus:outline-none focus:border-navy transition-colors rounded-none text-lg" required />
                        <label for="name" class="label-peer absolute left-0 top-3 opacity-50 uppercase tracking-[0.1em] text-sm transition-all duration-300 pointer-events-none">Your Name</label>
                    </div>

                    <div class="relative">
                        <input type="email" id="email" placeholder=" " class="input-peer w-full bg-transparent border-b border-navy/30 py-3 focus:outline-none focus:border-navy transition-colors rounded-none text-lg" required />
                        <label for="email" class="label-peer absolute left-0 top-3 opacity-50 uppercase tracking-[0.1em] text-sm transition-all duration-300 pointer-events-none">Email Address</label>
                    </div>

                    <div class="relative">
                        <textarea id="message" placeholder=" " rows="4" class="input-peer w-full bg-transparent border-b border-navy/30 py-3 focus:outline-none focus:border-navy transition-colors rounded-none text-lg resize-none" required></textarea>
                        <label for="message" class="label-peer absolute left-0 top-3 opacity-50 uppercase tracking-[0.1em] text-sm transition-all duration-300 pointer-events-none">Your Message</label>
                    </div>

                    <button type="submit" class="group relative w-full md:w-auto inline-flex items-center justify-center px-12 py-5 border border-navy overflow-hidden transition-all duration-500 uppercase tracking-[0.3em] text-[10px] md:text-xs">
                        <span class="absolute inset-0 w-full h-full bg-navy -translate-x-full group-hover:translate-x-0 transition-transform duration-500 ease-out"></span>
                        <span class="relative group-hover:text-[#F7F3EE] transition-colors duration-500">Send Message</span>
                    </button>

                </form>
            </div>

        </div>
    </main>

    <div class="fixed inset-0 z-40 pointer-events-none opacity-[0.04] mix-blend-multiply bg-[url('https://grainy-gradients.vercel.app/noise.svg')]"></div>

</body>
</html>
