<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Yuliy Bodurski — Maison de Couture</title>

  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Premium Fonts: Playfair Display (serif) + Jost (sans) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <style>
    /* ===== CUSTOM PROPERTIES ===== */
    :root {
      --serif: 'Playfair Display', 'Bodoni MT', Didot, serif;
      --sans: 'Jost', 'Helvetica Neue', Arial, sans-serif;
      --color-bg: #0a0303;
      --gradient-1: #ff5100;
      --gradient-2: #cc2b00;
      --text-glow: rgba(255, 81, 0, 0.25);
    }

    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--sans);
      background: var(--color-bg);
      overflow-x: hidden;
      cursor: default;
    }

    .font-serif {
      font-family: var(--serif);
    }
    .font-sans {
      font-family: var(--sans);
    }

    /* ===== ANIMATED GRADIENT BACKGROUND ===== */
    @keyframes gradientFlow {
      0%, 100% {
        background-position: 0% 50%;
      }
      25% {
        background-position: 100% 0%;
      }
      50% {
        background-position: 80% 80%;
      }
      75% {
        background-position: 20% 100%;
      }
    }

    .animate-gradient-bg {
      background-size: 200% 200%;
      animation: gradientFlow 20s cubic-bezier(0.45, 0.05, 0.35, 0.95) infinite;
    }

    /* ===== GRAIN TEXTURE OVERLAY (SVG noise) ===== */
    .grain::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 999;
      pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 200px 200px;
    }

    /* ===== ENTRANCE ANIMATIONS ===== */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes scaleUp {
      from {
        opacity: 0;
        transform: scale(0.92);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .animate-fade-up {
      animation: fadeUp 1.1s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }
    .animate-fade-down {
      animation: fadeDown 1.0s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }
    .animate-scale-up {
      animation: scaleUp 1.2s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }
    .delay-100 { animation-delay: 0.1s; opacity: 0; }
    .delay-200 { animation-delay: 0.2s; opacity: 0; }
    .delay-300 { animation-delay: 0.3s; opacity: 0; }
    .delay-400 { animation-delay: 0.4s; opacity: 0; }
    .delay-500 { animation-delay: 0.5s; opacity: 0; }

    /* ===== IMAGE MASK & GLOW ===== */
    .portrait-mask {
      -webkit-mask-image: linear-gradient(to top, transparent 0%, black 18%, black 85%, transparent 100%);
      mask-image: linear-gradient(to top, transparent 0%, black 18%, black 85%, transparent 100%);
    }

    .portrait-glow {
      filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.7)) 
              drop-shadow(0 0 60px rgba(255, 81, 0, 0.3));
    }

    /* ===== NAVIGATION LINK STYLES ===== */
    .nav-link {
      transition: opacity 0.35s ease, transform 0.35s ease, letter-spacing 0.3s;
      letter-spacing: 0.2em;
    }
    .nav-link:hover {
      opacity: 0.75;
      transform: translateY(-1px);
      letter-spacing: 0.25em;
    }

    /* Menu underline */
    .menu-underline {
      position: relative;
      padding-bottom: 4px;
    }
    .menu-underline::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 1px;
      background: rgba(255, 255, 255, 0.6);
      transition: width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), background 0.3s;
    }
    .menu-underline:hover::after {
      width: 100%;
      background: rgba(255, 255, 255, 0.9);
    }

    /* ===== PARALLAX PORTRAIT WRAPPER ===== */
    .parallax-image {
      will-change: transform;
      transition: transform 0.05s linear;
    }

    /* ===== SCROLL INDICATOR ===== */
    .scroll-indicator {
      animation: float 2.5s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(8px); }
    }
  </style>
</head>
<body class="grain h-screen w-screen relative overflow-hidden bg-[#0a0303]">

  <!-- ===== ANIMATED BACKGROUND LAYERS ===== -->
  <!-- Deep abstract blurred orbs for cinematic depth -->
  <div class="absolute inset-0 z-0 pointer-events-none">
    <div class="absolute top-[-15%] left-[-10%] w-[70%] h-[80%] rounded-full bg-[#1a0500] blur-[120px] opacity-60"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[65%] h-[75%] rounded-full bg-[#1b0703] blur-[130px] opacity-50"></div>
    <div class="absolute top-[40%] left-[20%] w-[45%] h-[50%] rounded-full bg-[#2d0a00] blur-[140px] opacity-30"></div>
  </div>

  <!-- ===== MAIN HERO CONTAINER ===== -->
  <main class="relative z-10 h-full w-full flex flex-col">

    <!-- ===== HEADER / NAVIGATION ===== -->
    <header class="w-full flex justify-between items-start px-5 sm:px-8 md:px-12 lg:px-16 py-6 md:py-8 z-30 uppercase tracking-[0.18em] text-xs sm:text-sm md:text-base text-white/90 font-sans font-light">

      <!-- Center: Menu with thin underline -->
      <button class="nav-link menu-underline animate-fade-down delay-100 flex flex-col items-center gap-1 group" aria-label="Open menu">

        <span class="text-[10px] sm:text-xs tracking-[0.25em]">MENU</span>

      <!-- Right: Contact -->
      <a href="#" class="nav-link animate-fade-down delay-200" aria-label="Contact">

    <!-- ===== CENTER STAGE: TYPOGRAPHY & IMAGE ===== -->
    <div class="flex-1 relative flex items-center justify-center">

      <!-- MASSIVE OVERSIZED BRAND NAME (partially off-screen, low opacity) -->
      <div class="absolute inset-0 flex items-center justify-center pointer-events-none overflow-hidden z-0" aria-hidden="true">
        <h1 class="font-serif text-[22vw] md:text-[18vw] lg:text-[16vw] xl:text-[15rem] text-white/10 font-normal leading-none tracking-[-0.02em] select-none whitespace-nowrap">
          YULIY
        </h1>
      </div>

      <!-- FOREGROUND TEXT (visible, animated) -->

<!--        <h2 class="animate-scale-up font-serif text-[5rem] sm:text-[7rem] md:text-[9rem] lg:text-[11rem] xl:text-[13rem] text-white leading-[0.85] tracking-tight drop-shadow-2xl"-->
<!--            style="text-shadow: 0 0 80px var(&#45;&#45;text-glow);">-->
<!--          Yuliy-->
<!--        </h2>-->
<!--        <p class="animate-fade-up delay-300 font-sans text-xs sm:text-sm md:text-base uppercase tracking-[0.35em] text-white/70 mt-2 sm:mt-4">-->
<!--          Autumn-Winter 2025-->
<!--        </p>-->
<!--      </div>-->

      <!-- ===== EDITORIAL PORTRAIT (center-bottom, parallax) ===== -->
      <div class="parallax-image absolute bottom-0 left-1/2 transform -translate-x-1/2 w-full max-w-[90vw] sm:max-w-[85vw] md:max-w-[75vw] lg:max-w-[65vw] xl:max-w-[55vw] h-[70vh] sm:h-[75vh] md:h-[82vh] lg:h-[90vh] flex justify-center items-end z-20 pointer-events-none"
           id="portraitContainer">
        <img 
          src="111.png"
          alt="Yuliy Bodurski editorial portrait" 
          class="portrait-mask portrait-glow h-full w-auto object-cover object-[50%_20%] max-w-none"
          loading="eager"
          fetchpriority="high"
          onerror="this.style.display='none';"
        />
      </div>

      <!-- ===== SUBTLE BOTTOM RIGHT TAGLINE ===== -->
      <div class="absolute bottom-5 right-5 sm:bottom-8 sm:right-8 md:bottom-10 md:right-12 z-30 pointer-events-none animate-fade-up delay-500">
        <span class="font-sans text-[10px] sm:text-xs tracking-[0.3em] uppercase text-white/40">
          Paris · Haute Couture
        </span>
      </div>

      <!-- ===== SCROLL INDICATOR (bottom center) ===== -->
      <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 z-30 flex flex-col items-center gap-2 animate-fade-up delay-500 pointer-events-none">
        <span class="font-sans text-[9px] sm:text-[10px] tracking-[0.25em] uppercase text-white/50">Scroll</span>
        <div class="w-[1px] h-8 bg-white/40 rounded-full scroll-indicator"></div>
      </div>
    </div>
  </main>

  <!-- ===== JAVASCRIPT: PARALLAX & MOUSE INTERACTION ===== -->
  <script>
    (function() {
      const portrait = document.getElementById('portraitContainer');
      if (!portrait) return;

      // Combined parallax: scroll + subtle mouse movement
      let currentScrollY = 0;
      let targetScrollY = 0;
      let mouseX = 0, mouseY = 0;
      let targetMouseX = 0, targetMouseY = 0;
      const scrollFactor = 0.15;    // upward movement on scroll
      const mouseFactor = 0.02;     // subtle tilt towards cursor

      function updateTransform() {
        // Smooth interpolation
        currentScrollY += (targetScrollY - currentScrollY) * 0.08;
        mouseX += (targetMouseX - mouseX) * 0.05;
        mouseY += (targetMouseY - mouseY) * 0.05;

        const translateY = currentScrollY + mouseY;
        const translateX = mouseX;

        portrait.style.transform = `translate(-50%, 0) translate3d(${translateX}px, ${translateY}px, 0)`;
        requestAnimationFrame(updateTransform);
      }

      // Scroll parallax
      window.addEventListener('scroll', () => {
        const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        targetScrollY = scrollTop * scrollFactor * -1; // move image up as user scrolls down
      }, { passive: true });

      // Mouse parallax (subtle)
      window.addEventListener('mousemove', (e) => {
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        targetMouseX = (e.clientX - centerX) * mouseFactor;
        targetMouseY = (e.clientY - centerY) * mouseFactor;
      });

      // Start animation loop
      updateTransform();

      // Also re-center mouse on touch devices (no movement)
      window.addEventListener('touchmove', () => {
        targetMouseX = 0;
        targetMouseY = 0;
      }, { passive: true });

    })();
  </script>

</body>
